appType: web-service

nameOverride: ""
fullnameOverride: ""

deployment:
  enabled: true
  replicaCount: 1

image:
  repository: nginxdemos/hello
  tag: plain-text
  pullPolicy: IfNotPresent

container:
  port: 80

service:
  enabled: true
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

probes:
  liveness:
    enabled: true
    path: /
  readiness:
    enabled: true
    path: /

configMap:
  enabled: false
  data: {}
  # Example:
  # data:
  #   APP_MESSAGE: "hello-from-configmap"
  #   FEATURE_FLAG: "true"
  #   LOG_LEVEL: "debug"

secret:
  enabled: false
  stringData: {}
  # Example:
  # stringData:
  #   API_TOKEN: "change-me"
  #   DB_PASSWORD: "change-me"

extraEnvFrom: []

env: []
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

labels: {}
nodeSelector: {}
tolerations: []
affinity: {}
